<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm danh - Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .checkin-container {
            max-width: 500px;
            width: 100%;
            margin: auto;
        }

        .checkin-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .session-info {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
        }

        .session-info h6 {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .session-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .session-detail label {
            color: #666;
            font-weight: 500;
        }

        .session-detail value {
            color: #333;
            font-weight: 600;
        }

        .form-section {
            padding: 30px;
        }

        .form-section h5 {
            margin-bottom: 20px;
            color: #333;
            font-weight: 600;
        }

        .camera-preview {
            width: 100%;
            border-radius: 8px;
            background: #000;
            margin-bottom: 20px;
            display: none;
        }

        .camera-preview.active {
            display: block;
        }

        .student-input {
            margin-bottom: 20px;
        }

        .btn-capture {
            width: 100%;
            padding: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-box {
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .result-box.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result-box.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result-box.info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        .result-box.active {
            display: block;
        }

        .spinner-box {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .spinner-box.active {
            display: block;
        }

        .confidence-score {
            margin-top: 10px;
            font-size: 13px;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .form-section {
                padding: 20px;
            }

            .session-info {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="checkin-container">
        <div class="checkin-card">
            <!-- Session Info -->
            <div class="session-info">
                <h6><i class="bi bi-info-circle"></i> Thông tin buổi học</h6>
                <div class="session-detail">
                    <label>Lớp:</label>
                    <value id="sessClassroom">--</value>
                </div>
                <div class="session-detail">
                    <label>Môn:</label>
                    <value id="sessSubject">--</value>
                </div>
                <div class="session-detail">
                    <label>Ngày:</label>
                    <value id="sessDate">--</value>
                </div>
                <div class="session-detail">
                    <label>Giờ:</label>
                    <value id="sessTime">--</value>
                </div>
                <div class="session-detail">
                    <label>Trạng thái:</label>
                    <value id="sessStatus">--</value>
                </div>
            </div>

            <!-- Check-in Form -->
            <div class="form-section">
                <h5><i class="bi bi-camera"></i> Điểm danh bằng khuôn mặt</h5>

                <!-- Student Input -->
                <div class="student-input">
                    <label for="studentCode" class="form-label">Mã số sinh viên</label>
                    <input type="text" id="studentCode" class="form-control" placeholder="Nhập mã số SV" maxlength="20">
                </div>

                <!-- Camera Preview -->
                <video id="cameraPreview" class="camera-preview"></video>

                <!-- Loading State -->
                <div id="spinnerBox" class="spinner-box">
                    <div class="spinner-border text-primary mb-2" role="status">
                        <span class="visually-hidden">Đang xử lý...</span>
                    </div>
                    <p class="text-muted small">Đang phân tích khuôn mặt...</p>
                </div>

                <!-- Buttons -->
                <div id="buttonGroup">
                    <button id="btnStartCamera" class="btn btn-primary btn-capture">
                        <i class="bi bi-camera"></i> Bật camera
                    </button>
                    <button id="btnCapture" class="btn btn-success btn-capture" style="display: none;">
                        <i class="bi bi-capture"></i> Chụp và gửi
                    </button>
                    <button id="btnStopCamera" class="btn btn-secondary btn-capture" style="display: none;">
                        <i class="bi bi-stop"></i> Tắt camera
                    </button>
                </div>

                <!-- Result -->
                <div id="resultBox" class="result-box">
                    <div id="resultMessage">--</div>
                    <div id="resultDetails" class="confidence-score"></div>
                    <button class="btn btn-sm btn-outline-primary mt-3" onclick="resetForm()">
                        <i class="bi bi-arrow-clockwise"></i> Thử lại
                    </button>
                </div>
            </div>
        </div>

        <!-- Info Footer -->
        <div class="text-white text-center mt-4 small">
            <p><i class="bi bi-shield-check"></i> Điểm danh an toàn - Không lưu trữ hình ảnh</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/modules/public/checkin.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSessionInfo({{ session_id }});
        });
    </script>
</body>
</html>
