{% extends "layouts/base.html" %}
{% block title %}Học kỳ - Smart Attendance{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-calendar2-week"></i> {{ page_title or 'Học kỳ' }}</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#semModal" onclick="resetForm()">
        <i class="bi bi-plus"></i> Thêm mới
    </button>
</div>
<div class="card mb-4"><div class="card-body"><div class="row g-2">
    <div class="col-md-3"><input type="text" id="searchInput" class="form-control" placeholder="Tìm theo mã, tên"></div>
    <div class="col-md-3"><select id="filterAY" class="form-select"><option value="">Tất cả năm học</option></select></div>
    <div class="col-md-3"><select id="filterActive" class="form-select"><option value="">Tất cả TT</option><option value="true">Hoạt động</option><option value="false">Không</option></select></div>
    <div class="col-md-3"><button class="btn btn-outline-secondary w-100" onclick="loadSemesters()"><i class="bi bi-search"></i> Tìm</button></div>
</div></div></div>
<div id="loadingState" class="text-center py-5 d-none"><div class="spinner-border text-primary"></div></div>
<div id="emptyState" class="text-center py-5 d-none"><i class="bi bi-inbox" style="font-size:3rem;color:#ccc;"></i><p class="text-muted mt-3">Chưa có học kỳ nào</p></div>
<div id="tableContainer" class="d-none">
    <div class="card"><div class="table-responsive"><table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Mã</th><th>Tên học kỳ</th><th>Năm học</th><th>Bắt đầu</th><th>Kết thúc</th><th>Hiện tại</th><th>TT</th><th>Hành động</th></tr></thead>
        <tbody id="semTable"></tbody>
    </table></div></div>
    <nav id="paginationContainer" class="mt-3 d-none"><ul class="pagination justify-content-center" id="paginationList"></ul></nav>
</div>
<div class="modal fade" id="semModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle">Thêm học kỳ</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <form id="semForm" onsubmit="saveSem(event)"><div class="modal-body">
        <input type="hidden" id="semId">
        <div class="mb-3"><label class="form-label">Mã học kỳ *</label>
            <input type="text" id="smCode" class="form-control" required placeholder="VD: HK1-2024">
            <small class="text-danger d-none" id="codeError"></small></div>
        <div class="mb-3"><label class="form-label">Tên học kỳ *</label>
            <input type="text" id="smName" class="form-control" required placeholder="VD: Học kỳ 1 năm 2024-2025">
            <small class="text-danger d-none" id="nameError"></small></div>
        <div class="mb-3"><label class="form-label">Năm học *</label>
            <select id="smAY" class="form-select" required><option value="">-- Chọn năm học --</option></select>
            <small class="text-danger d-none" id="ayError"></small></div>
        <div class="row"><div class="col">
            <div class="mb-3"><label class="form-label">Ngày bắt đầu *</label>
                <input type="date" id="smStart" class="form-control" required>
                <small class="text-danger d-none" id="startError"></small></div>
        </div><div class="col">
            <div class="mb-3"><label class="form-label">Ngày kết thúc *</label>
                <input type="date" id="smEnd" class="form-control" required>
                <small class="text-danger d-none" id="endError"></small></div>
        </div></div>
        <div class="form-check mb-2"><input type="checkbox" id="smCurrent" class="form-check-input"><label class="form-check-label" for="smCurrent">Học kỳ hiện tại</label></div>
        <div class="form-check"><input type="checkbox" id="smActive" class="form-check-input" checked><label class="form-check-label" for="smActive">Hoạt động</label></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button type="submit" class="btn btn-primary" id="submitBtn"><span id="submitBtnText">Lưu</span><span id="submitBtnSpinner" class="spinner-border spinner-border-sm d-none ms-1"></span></button>
    </div></form>
</div></div></div>
<div id="alertContainer"></div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/modules/admin/semesters.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    loadAcademicYears(); loadSemesters();
    document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key==='Enter') loadSemesters(); });
});
</script>
{% endblock %}
