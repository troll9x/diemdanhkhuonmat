{% extends "layouts/base.html" %}

{% block title %}Audit Logs - Smart Attendance{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-journal-text"></i> {{ page_title or 'Audit Logs' }}</h2>
    <button class="btn btn-sm btn-outline-danger" onclick="cleanupLogs()" title="Xóa logs cũ hơn 90 ngày">
        <i class="bi bi-trash"></i> Dọn dẹp logs cũ
    </button>
</div>

<!-- Filters -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-2">
            <div class="col-md-2">
                <input type="date" id="filterStart" class="form-control" placeholder="Từ ngày">
            </div>
            <div class="col-md-2">
                <input type="date" id="filterEnd" class="form-control" placeholder="Đến ngày">
            </div>
            <div class="col-md-2">
                <select id="filterAction" class="form-select">
                    <option value="">Tất cả hành động</option>
                    <option value="create">Create</option>
                    <option value="update">Update</option>
                    <option value="delete">Delete</option>
                    <option value="login">Login</option>
                    <option value="logout">Logout</option>
                    <option value="export">Export</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="filterUserType" class="form-select">
                    <option value="">Tất cả loại user</option>
                    <option value="admin">Admin</option>
                    <option value="lecturer">Giảng viên</option>
                    <option value="student">Sinh viên</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="text" id="filterEntity" class="form-control" placeholder="Thực thể (Entity)">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="loadLogs(1)">
                    <i class="bi bi-search"></i> Lọc
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Loading -->
<div id="loadingState" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Đang tải...</p>
</div>

<!-- Empty state -->
<div id="emptyState" class="text-center py-5 d-none">
    <i class="bi bi-journal" style="font-size:3rem;color:#ccc;"></i>
    <p class="text-muted mt-3">Không có log nào</p>
</div>

<!-- Table -->
<div id="tableContainer" class="d-none">
    <div class="card">
        <div class="card-header" id="tableCaption">Audit Logs</div>
        <div class="table-responsive">
            <table class="table table-hover table-sm mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>User</th>
                        <th>Loại</th>
                        <th>Hành động</th>
                        <th>Thực thể</th>
                        <th>IP</th>
                        <th>Thời gian</th>
                    </tr>
                </thead>
                <tbody id="logsTable"></tbody>
            </table>
        </div>
    </div>
    <nav class="mt-3">
        <ul class="pagination justify-content-center" id="pagination"></ul>
    </nav>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => loadLogs(1));

    async function loadLogs(page = 1) {
        document.getElementById('loadingState').classList.remove('d-none');
        document.getElementById('tableContainer').classList.add('d-none');
        document.getElementById('emptyState').classList.add('d-none');

        try {
            const params = new URLSearchParams({
                page, per_page: 50,
                ...(document.getElementById('filterStart').value && {start_date: document.getElementById('filterStart').value}),
                ...(document.getElementById('filterEnd').value && {end_date: document.getElementById('filterEnd').value}),
                ...(document.getElementById('filterAction').value && {action: document.getElementById('filterAction').value}),
                ...(document.getElementById('filterUserType').value && {user_type: document.getElementById('filterUserType').value}),
                ...(document.getElementById('filterEntity').value && {entity_name: document.getElementById('filterEntity').value}),
            });

            const data = await api.get('/system/audit-logs?' + params.toString());
            const logs = data.logs || [];

            document.getElementById('loadingState').classList.add('d-none');

            if (!logs.length) {
                document.getElementById('emptyState').classList.remove('d-none');
                return;
            }

            document.getElementById('tableCaption').textContent =
                `Tổng ${data.pagination.total} logs`;

            const tbody = document.getElementById('logsTable');
            tbody.innerHTML = logs.map((l, i) => `
                <tr>
                    <td>${l.id}</td>
                    <td>${l.user_id || '—'}</td>
                    <td><span class="badge bg-secondary">${l.user_type || '—'}</span></td>
                    <td><span class="badge bg-${actionColor(l.action)}">${l.action}</span></td>
                    <td>${escHtml(l.entity_name || '—')}${l.entity_id ? ` #${l.entity_id}` : ''}</td>
                    <td><small>${l.ip_address || '—'}</small></td>
                    <td><small>${l.created_at}</small></td>
                </tr>
            `).join('');

            renderPagination(data.pagination, page);
            document.getElementById('tableContainer').classList.remove('d-none');
        } catch(e) {
            document.getElementById('loadingState').classList.add('d-none');
            document.getElementById('tableContainer').innerHTML =
                `<div class="alert alert-danger">Lỗi: ${e.message}</div>`;
            document.getElementById('tableContainer').classList.remove('d-none');
        }
    }

    function actionColor(a) {
        return {create:'success', update:'primary', delete:'danger',
                login:'info', logout:'secondary', export:'warning'}[a] || 'secondary';
    }

    async function cleanupLogs() {
        if (!confirm('Xóa tất cả logs cũ hơn 90 ngày?')) return;
        try {
            const data = await api.delete('/system/cleanup/old-logs?days=90');
            alert(`Đã xóa ${data.deleted_count} logs`);
            loadLogs(1);
        } catch(e) { alert('Lỗi: ' + e.message); }
    }

    function renderPagination(p, page) {
        const ul = document.getElementById('pagination');
        if (!p || p.pages <= 1) { ul.innerHTML = ''; return; }
        let html = `<li class="page-item ${!p.has_prev?'disabled':''}">
            <a class="page-link" onclick="loadLogs(${page-1})">‹</a></li>`;
        for (let i = 1; i <= Math.min(p.pages, 10); i++) {
            html += `<li class="page-item ${i===page?'active':''}">
                <a class="page-link" onclick="loadLogs(${i})">${i}</a></li>`;
        }
        html += `<li class="page-item ${!p.has_next?'disabled':''}">
            <a class="page-link" onclick="loadLogs(${page+1})">›</a></li>`;
        ul.innerHTML = html;
    }

    function escHtml(t) {
        const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML;
    }
</script>
{% endblock %}
