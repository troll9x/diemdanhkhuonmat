{% extends "layouts/base.html" %}
{% block title %}Năm học - Smart Attendance{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-calendar3"></i> {{ page_title or 'Năm học' }}</h2>
</div>
<div id="loadingState" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
<div id="emptyState" class="text-center py-5 d-none">
    <i class="bi bi-calendar-x" style="font-size:3rem;color:#ccc;"></i>
    <p class="text-muted mt-3">Chưa có năm học nào</p>
</div>
<div id="tableContainer" class="card d-none">
    <div class="card-header"><i class="bi bi-list"></i> Danh sách năm học</div>
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>Năm học</th><th>Bắt đầu</th><th>Kết thúc</th><th>Hiện tại</th><th>Trạng thái</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const data = await api.get('/academic-years');
        document.getElementById('loadingState').classList.add('d-none');
        const items = data.items || [];
        if (!items.length) { document.getElementById('emptyState').classList.remove('d-none'); return; }
        document.getElementById('tableBody').innerHTML = items.map(i => `
            <tr>
                <td><strong>${esc(i.year)}</strong></td>
                <td>${i.start_date || '—'}</td>
                <td>${i.end_date || '—'}</td>
                <td>${i.is_current ? '<span class="badge bg-success">Hiện tại</span>' : '—'}</td>
                <td><span class="badge bg-${i.is_active ? 'primary' : 'secondary'}">${i.is_active ? 'Hoạt động' : 'Dừng'}</span></td>
            </tr>`).join('');
        document.getElementById('tableContainer').classList.remove('d-none');
    } catch(e) {
        document.getElementById('loadingState').innerHTML = `<div class="alert alert-danger">Lỗi: ${e.message}</div>`;
    }
});
function esc(t) { const d = document.createElement('div'); d.textContent = t||''; return d.innerHTML; }
</script>
{% endblock %}
