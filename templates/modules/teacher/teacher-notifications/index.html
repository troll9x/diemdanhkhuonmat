{% extends "layouts/base.html" %}

{% block title %}Thông báo - Smart Attendance{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-bell"></i> {{ page_title or 'Thông báo' }}
        <span class="badge bg-danger ms-2" id="unreadBadge" style="display:none;"></span>
    </h2>
    <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary" onclick="markAllRead()">
            <i class="bi bi-check2-all"></i> Đánh dấu tất cả đã đọc
        </button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteAllRead()">
            <i class="bi bi-trash"></i> Xóa đã đọc
        </button>
    </div>
</div>

<!-- Filter tabs -->
<ul class="nav nav-tabs mb-4">
    <li class="nav-item">
        <a class="nav-link active" href="#" onclick="filterNotifs('all');return false;" id="tab-all">Tất cả</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="#" onclick="filterNotifs('unread');return false;" id="tab-unread">Chưa đọc</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" href="#" onclick="filterNotifs('read');return false;" id="tab-read">Đã đọc</a>
    </li>
</ul>

<div id="loadingState" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Đang tải...</p>
</div>

<div id="emptyState" class="text-center py-5 d-none">
    <i class="bi bi-bell-slash" style="font-size:3rem;color:#ccc;"></i>
    <p class="text-muted mt-3">Không có thông báo nào</p>
</div>

<div id="notifList" class="d-none"></div>

<nav class="mt-3">
    <ul class="pagination justify-content-center" id="pagination"></ul>
</nav>
{% endblock %}

{% block extra_js %}
<script>
    let currentFilter = 'all';
    let currentPage = 1;

    document.addEventListener('DOMContentLoaded', () => loadNotifications());

    async function loadNotifications(page = 1) {
        currentPage = page;
        document.getElementById('loadingState').classList.remove('d-none');
        document.getElementById('notifList').classList.add('d-none');
        document.getElementById('emptyState').classList.add('d-none');

        try {
            const params = new URLSearchParams({ page, per_page: 20 });
            if (currentFilter === 'unread') params.set('is_read', 'false');
            if (currentFilter === 'read') params.set('is_read', 'true');

            const data = await api.get('/notifications?' + params.toString());
            const notifs = data.notifications || [];
            const unread = data.unread_count || 0;

            const badge = document.getElementById('unreadBadge');
            if (unread > 0) { badge.textContent = unread; badge.style.display = ''; }
            else { badge.style.display = 'none'; }

            document.getElementById('loadingState').classList.add('d-none');

            if (!notifs.length) {
                document.getElementById('emptyState').classList.remove('d-none');
                return;
            }

            const container = document.getElementById('notifList');
            container.innerHTML = notifs.map(n => `
                <div class="card mb-2 ${n.is_read ? '' : 'border-primary'}">
                    <div class="card-body py-2 px-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="badge bg-${typeColor(n.type)} me-2">${n.type}</span>
                                <strong>${escHtml(n.title)}</strong>
                                ${!n.is_read ? '<span class="badge bg-primary ms-1">Mới</span>' : ''}
                                <br>
                                <span class="text-muted small">${escHtml(n.message)}</span>
                                <br>
                                <span class="text-muted" style="font-size:11px;">${n.created_at}</span>
                            </div>
                            <div class="d-flex gap-1 ms-3">
                                ${!n.is_read ? `
                                    <button class="btn btn-sm btn-outline-primary" onclick="markRead(${n.id})" title="Đánh dấu đã đọc">
                                        <i class="bi bi-check"></i>
                                    </button>
                                ` : ''}
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteNotif(${n.id})" title="Xóa">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            container.classList.remove('d-none');

            renderPagination(data.pagination);
        } catch(e) {
            document.getElementById('loadingState').classList.add('d-none');
            document.getElementById('notifList').innerHTML =
                `<div class="alert alert-danger">Lỗi: ${e.message}</div>`;
            document.getElementById('notifList').classList.remove('d-none');
        }
    }

    function typeColor(t) {
        return {info:'info', success:'success', warning:'warning', error:'danger'}[t] || 'secondary';
    }

    function filterNotifs(f) {
        currentFilter = f;
        ['all','unread','read'].forEach(id => document.getElementById('tab-'+id).classList.remove('active'));
        document.getElementById('tab-'+f).classList.add('active');
        loadNotifications(1);
    }

    async function markRead(id) {
        try {
            await api.put(`/notifications/${id}/read`, {});
            loadNotifications(currentPage);
        } catch(e) { alert('Lỗi: ' + e.message); }
    }

    async function markAllRead() {
        try {
            await api.put('/notifications/read-all', {});
            loadNotifications(1);
        } catch(e) { alert('Lỗi: ' + e.message); }
    }

    async function deleteNotif(id) {
        try {
            await api.delete(`/notifications/${id}`);
            loadNotifications(currentPage);
        } catch(e) { alert('Lỗi: ' + e.message); }
    }

    async function deleteAllRead() {
        if (!confirm('Xóa tất cả thông báo đã đọc?')) return;
        try {
            await api.delete('/notifications/delete-read');
            loadNotifications(1);
        } catch(e) { alert('Lỗi: ' + e.message); }
    }

    function renderPagination(p) {
        const ul = document.getElementById('pagination');
        if (!p || p.pages <= 1) { ul.innerHTML = ''; return; }
        let html = `<li class="page-item ${!p.has_prev?'disabled':''}">
            <a class="page-link" onclick="loadNotifications(${p.page-1})">‹</a></li>`;
        for (let i = 1; i <= p.pages; i++) {
            html += `<li class="page-item ${i===p.page?'active':''}">
                <a class="page-link" onclick="loadNotifications(${i})">${i}</a></li>`;
        }
        html += `<li class="page-item ${!p.has_next?'disabled':''}">
            <a class="page-link" onclick="loadNotifications(${p.page+1})">›</a></li>`;
        ul.innerHTML = html;
    }

    function escHtml(t) {
        const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML;
    }
</script>
{% endblock %}
