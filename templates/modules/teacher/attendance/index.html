{% extends "layouts/base.html" %}
{% block title %}Điểm danh — Giảng viên{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="/teacher/classes" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <div>
        <h4 class="fw-bold mb-1" id="classTitle">Điểm danh</h4>
        <p class="text-muted mb-0" id="classSubtitle"></p>
    </div>
</div>

<div id="alertBox"></div>

<!-- ── Today's sessions overview ───────────────────────────────────── -->
<div class="row g-3 mb-4" id="sessionCards">
    <!-- Populated by JS -->
</div>

<!-- ── Start session panel ─────────────────────────────────────────── -->
<div class="card mb-4" id="startPanel">
  <div class="card-header fw-semibold">
    <i class="bi bi-play-circle me-2 text-success"></i>Mở phiên điểm danh mới
  </div>
  <div class="card-body">
    <div class="row g-3 align-items-end">
      <div class="col-md-4">
        <label class="form-label fw-semibold">Loại phiên</label>
        <select class="form-select" id="sessionTypeSelect">
          <option value="start">Đầu giờ</option>
          <option value="end">Cuối giờ</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label fw-semibold">Muộn sau (phút)</label>
        <input type="number" class="form-control" id="lateMinutes" value="15" min="1" max="120">
        <div class="form-text">Áp dụng cho phiên Đầu giờ</div>
      </div>
      <div class="col-auto">
        <button class="btn btn-success" id="startBtn" onclick="startAttendance()">
          <i class="bi bi-geo-alt me-2"></i>Bắt đầu điểm danh
          <span id="startSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
        </button>
      </div>
    </div>
    <p class="text-muted small mt-2 mb-0">
      <i class="bi bi-info-circle me-1"></i>Trình duyệt sẽ xin GPS của bạn.
    </p>
  </div>
</div>

<!-- ── Session detail tabs ──────────────────────────────────────────── -->
<div id="sessionDetail" style="display:none">
  <ul class="nav nav-tabs mb-3" id="sessionTabs">
    <!-- Tabs built dynamically -->
  </ul>
  <div id="sessionTabContent"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>const PAGE_CLASS_ID = {{ class_id | default(0) }};</script>
<script src="{{ url_for('static', filename='js/modules/teacher/attendance.js') }}"></script>
{% endblock %}
