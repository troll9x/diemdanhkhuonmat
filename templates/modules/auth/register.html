<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký — Smart Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; display:flex; align-items:center; }
        .card { border:none; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.25); }
        .btn-primary { background:linear-gradient(135deg,#667eea,#764ba2); border:none; }
        .btn-primary:hover { opacity:.9; }
    </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 mt-4 mb-4">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
            <h4 class="mt-2 fw-bold">Đăng ký tài khoản</h4>
        </div>
        <div id="alertBox"></div>
        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Vai trò</label>
            <select class="form-select" id="role" required>
                <option value="">-- Chọn vai trò --</option>
                <option value="teacher">Giảng viên</option>
                <option value="student">Sinh viên</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Họ và tên</label>
            <input type="text" class="form-control" id="full_name" placeholder="Nguyễn Văn A" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" id="email" placeholder="email@example.com" required>
          </div>
          <div id="studentCodeField" class="mb-3" style="display:none">
            <label class="form-label fw-semibold">Mã sinh viên <span class="text-muted">(tuỳ chọn)</span></label>
            <input type="text" class="form-control" id="student_code" placeholder="VD: SV001">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mật khẩu</label>
            <input type="password" class="form-control" id="password" placeholder="Tối thiểu 8 ký tự" required>
            <div class="form-text">Cần chữ hoa, chữ thường và số.</div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Xác nhận mật khẩu</label>
            <input type="password" class="form-control" id="confirmPassword" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="submitBtn">
            <span id="btnText">Đăng ký</span>
            <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
          </button>
        </form>
        <p class="text-center mt-3 mb-0">Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/auth.js"></script>
<script>
    document.getElementById('role').addEventListener('change', function() {
        document.getElementById('studentCodeField').style.display =
            this.value === 'student' ? 'block' : 'none';
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('alertBox');
        alertBox.innerHTML = '';

        const pwd = document.getElementById('password').value;
        const cpwd = document.getElementById('confirmPassword').value;
        if (pwd !== cpwd) {
            alertBox.innerHTML = '<div class="alert alert-danger">Mật khẩu xác nhận không khớp</div>';
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        document.getElementById('btnSpinner').classList.remove('d-none');

        const payload = {
            role: document.getElementById('role').value,
            full_name: document.getElementById('full_name').value.trim(),
            email: document.getElementById('email').value.trim().toLowerCase(),
            password: pwd,
            student_code: document.getElementById('student_code').value.trim() || undefined,
        };

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
            });
            const data = await res.json();
            if (res.ok) {
                auth.setTokens(data.access_token, data.refresh_token);
                auth.setUser(data.user);
                const role = data.user.role;
                window.location.href = role === 'teacher' ? '/teacher/dashboard' : '/student/dashboard';
            } else {
                alertBox.innerHTML = `<div class="alert alert-danger">${data.error || 'Đăng ký thất bại'}</div>`;
            }
        } catch (err) {
            alertBox.innerHTML = '<div class="alert alert-danger">Lỗi kết nối máy chủ</div>';
        } finally {
            btn.disabled = false;
            document.getElementById('btnSpinner').classList.add('d-none');
        }
    });
</script>
</body>
</html>
