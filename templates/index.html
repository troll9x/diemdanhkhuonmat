<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Smart Attendance System</h1>
            <p class="text-muted">Hệ thống điểm danh thông minh</p>
        </div>

        <div class="row justify-content-center g-4">
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center p-4">
                        <div class="fs-1 mb-3">📷</div>
                        <h5 class="card-title">Điểm danh</h5>
                        <p class="card-text text-muted">
                            Bật webcam và tự động nhận diện khuôn mặt.</p>
                        <a href="/attendance" class="btn btn-primary w-100">Bắt đầu</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center p-4">
                        <div class="fs-1 mb-3">👤</div>
                        <h5 class="card-title">Đăng ký người dùng</h5>
                        <p class="card-text text-muted">Thêm một sinh viên và chụp ảnh khuôn mặt.</p>
                        <a href="/register" class="btn btn-success w-100">Đăng ký</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center p-4">
                        <div class="fs-1 mb-3">📊</div>
                        <h5 class="card-title">Dashboard</h5>
                        <p class="card-text text-muted">Xem hồ sơ điểm danh, thống kê và xuất báo cáo.</p>
                        <a href="/dashboard" class="btn btn-secondary w-100">Xem</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
