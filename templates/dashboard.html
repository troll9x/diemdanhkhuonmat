<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Admin Dashboard</h2>
            <div class="d-flex gap-2">
                <a href="/register" class="btn btn-success btn-sm">+ Register User</a>
                <a href="/" class="btn btn-outline-secondary btn-sm">← Back</a>
            </div>
        </div>

        <!-- Stats cards -->
        <div class="row g-3 mb-4">
            <div class="col-sm-4">
                <div class="card shadow-sm text-center p-3">
                    <div class="fs-1 fw-bold text-primary" id="stat-total">—</div>
                    <div class="text-muted small">Total Users</div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="card shadow-sm text-center p-3">
                    <div class="fs-1 fw-bold text-success" id="stat-today">—</div>
                    <div class="text-muted small">Present Today</div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="card shadow-sm text-center p-3">
                    <div class="fs-1 fw-bold text-warning" id="stat-pct">—</div>
                    <div class="text-muted small">Attendance Rate</div>
                </div>
            </div>
        </div>

        <!-- Chart -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h6 class="text-muted mb-3">Attendance by Department</h6>
                <canvas id="dept-chart" height="100"></canvas>
            </div>
        </div>

        <!-- Filters -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-sm-3">
                        <label class="form-label small">Date</label>
                        <input type="date" id="filter-date" class="form-control form-control-sm">
                    </div>
                    <div class="col-sm-3">
                        <label class="form-label small">Department</label>
                        <input type="text" id="filter-dept" class="form-control form-control-sm" placeholder="All">
                    </div>
                    <div class="col-sm-2">
                        <button class="btn btn-primary btn-sm w-100" onclick="loadRecords()">🔍 Filter</button>
                    </div>
                    <div class="col-sm-2">
                        <button class="btn btn-outline-secondary btn-sm w-100" onclick="clearFilters()">✕ Clear</button>
                    </div>
                    <div class="col-sm-2">
                        <a href="/api/attendance/export" class="btn btn-outline-success btn-sm w-100">⬇ Export CSV</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Records table -->
        <div class="card shadow-sm mb-5">
            <div class="card-header d-flex justify-content-between">
                <span class="fw-semibold">Attendance Records</span>
                <span id="record-count" class="badge bg-secondary">0</span>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="records-body">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-4">Loading…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Users list -->
        <div class="card shadow-sm mb-5">
            <div class="card-header fw-semibold">Registered Users</div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Registered</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="users-body">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-4">Loading…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;

        async function loadStats() {
            const res = await fetch('/api/attendance/stats');
            const data = await res.json();
            document.getElementById('stat-total').textContent = data.total_users;
            document.getElementById('stat-today').textContent = data.today_count;
            const pct = data.total_users > 0
                ? Math.round((data.today_count / data.total_users) * 100) + '%'
                : '0%';
            document.getElementById('stat-pct').textContent = pct;
        }

        async function loadRecords() {
            const date = document.getElementById('filter-date').value;
            const dept = document.getElementById('filter-dept').value.trim();
            let url = '/api/attendance/?';
            if (date) url += 'date=' + date + '&';
            if (dept) url += 'department=' + encodeURIComponent(dept) + '&';

            const res = await fetch(url);
            const records = await res.json();
            document.getElementById('record-count').textContent = records.length;

            const tbody = document.getElementById('records-body');
            if (!records.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No records found.</td></tr>';
                return;
            }

            tbody.innerHTML = records.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${r.name}</strong></td>
        <td>${r.department || '—'}</td>
        <td>${r.date}</td>
        <td>${r.time}</td>
        <td><span class="badge bg-success">${r.status}</span></td>
      </tr>
    `).join('');

            buildChart(records);
        }

        function buildChart(records) {
            const counts = {};
            records.forEach(r => {
                const d = r.department || 'Unknown';
                counts[d] = (counts[d] || 0) + 1;
            });

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('dept-chart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        label: 'Attendance', data: Object.values(counts),
                        backgroundColor: 'rgba(13,110,253,0.6)', borderRadius: 6
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });
        }

        async function loadUsers() {
            const res = await fetch('/api/users/');
            const users = await res.json();
            const tbody = document.getElementById('users-body');

            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No users registered.</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(u => `
      <tr>
        <td>${u.id}</td>
        <td><strong>${u.full_name}</strong></td>
        <td>${u.email || '—'}</td>
        <td>${u.department || '—'}</td>
        <td>${u.created_at.split('T')[0]}</td>
        <td>
          <button class="btn btn-outline-danger btn-sm" onclick="deleteUser(${u.id}, '${u.full_name}')">Delete</button>
        </td>
      </tr>
    `).join('');
        }

        async function deleteUser(id, name) {
            if (!confirm('Delete ' + name + '? This cannot be undone.')) return;
            await fetch('/api/users/' + id, { method: 'DELETE' });
            loadUsers();
            loadStats();
        }

        function clearFilters() {
            document.getElementById('filter-date').value = '';
            document.getElementById('filter-dept').value = '';
            loadRecords();
        }

        // Init
        loadStats();
        loadRecords();
        loadUsers();
    </script>
</body>

</html>
