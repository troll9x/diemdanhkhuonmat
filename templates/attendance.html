<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Take Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-4" style="max-width:800px">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Điểm danh trực tiếp</h2>
            <a href="/" class="btn btn-outline-secondary btn-sm">← Quay lại</a>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-3">
                <video id="video" width="100%" height="400" autoplay playsinline class="rounded bg-dark"
                    style="object-fit:cover;display:block"></video>
                <canvas id="canvas" width="640" height="480" class="d-none"></canvas>
            </div>
        </div>

        <div class="d-flex gap-2 mb-4">
            <button id="start-btn" class="btn btn-primary px-4" onclick="startRecognition()">▶ Bắt đầu</button>
            <button id="stop-btn" class="btn btn-danger px-4 d-none" onclick="stopRecognition()">⏹ Dừng</button>
        </div>

        <div id="status-box" class="alert alert-secondary">
            Ấn <strong>Bắt đầu</strong> để bắt đầu điểm danh.
        </div>

        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Bản ghi hôm nay</span>
                <span id="log-count" class="badge bg-primary">0</span>
            </div>
            <ul id="log-list" class="list-group list-group-flush">
                <li class="list-group-item text-muted small">Chưa có bản ghi nào.</li>
            </ul>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let running = false;
        let timer = null;
        const log = [];

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => { video.srcObject = s; })
            .catch(() => setStatus('Hiện không thể truy cập camera.', 'danger'));

        function startRecognition() {
            running = true;
            document.getElementById('start-btn').classList.add('d-none');
            document.getElementById('stop-btn').classList.remove('d-none');
            setStatus('🔍 Đang quét khuôn mặt…', 'info');
            sendFrame();
        }

        function stopRecognition() {
            running = false;
            clearTimeout(timer);
            document.getElementById('stop-btn').classList.add('d-none');
            document.getElementById('start-btn').classList.remove('d-none');
            setStatus('Dừng nhận diện.', 'secondary');
        }

        async function sendFrame() {
            if (!running) return;
            ctx.drawImage(video, 0, 0, 640, 480);

            canvas.toBlob(async (blob) => {
                try {
                    const res = await fetch('/api/recognize/frame', {
                        method: 'POST',
                        headers: { 'Content-Type': 'image/jpeg' },
                        body: blob
                    });
                    const data = await res.json();

                    if (data.status === 'success') {
                        setStatus('✅ ' + data.name + ' — ' + data.department + ' (' + data.confidence + '%)', 'success');
                        addLog(data.name, data.department, data.time, data.confidence);
                    } else if (data.status === 'duplicate') {
                        setStatus('⚠️ ' + data.name + ' đã điểm danh hôm nay.', 'warning');
                    } else if (data.status === 'spoof') {
                        setStatus('🚨 Phát hiện bất thường — vui lòng nhìn thẳng vào camera.', 'danger');
                    } else if (data.status === 'unknown') {
                        setStatus('❓ Chưa nhận diện được khuôn mặt.', 'secondary');
                    } else {
                        setStatus('🔍 Không phát hiện khuôn mặt — vui lòng nhìn vào camera.', 'info');
                    }
                } catch (e) {
                    setStatus('Server error: ' + e.message, 'danger');
                }

                timer = setTimeout(sendFrame, 1500);
            }, 'image/jpeg', 0.8);
        }

        function setStatus(msg, type) {
            const el = document.getElementById('status-box');
            el.className = 'alert alert-' + type;
            el.innerHTML = msg;
        }

        function addLog(name, dept, time, conf) {
            if (log.find(l => l.name === name)) return; // dedupe in UI too
            log.unshift({ name, dept, time, conf });
            document.getElementById('log-count').textContent = log.length;
            const list = document.getElementById('log-list');
            list.innerHTML = log.map(l =>
                `<li class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <strong>${l.name}</strong>
          <span class="text-muted small ms-2">${l.dept}</span>
        </div>
        <div class="text-end">
          <span class="badge bg-success me-2">${l.conf}%</span>
          <span class="text-muted small">${l.time}</span>
        </div>
      </li>`
            ).join('');
        }
    </script>
</body>

</html>
