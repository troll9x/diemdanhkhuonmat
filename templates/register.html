<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #video {
      display: block;
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: .375rem;
      transition: border-color .2s, box-shadow .2s;
    }

    .ring-ok {
      border: 3px solid #198754;
      box-shadow: 0 0 0 3px #19875440;
    }

    .ring-wait {
      border: 3px solid #6c757d;
    }

    .thumb {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 4px;
      border: 2px solid #198754;
    }

    #thumbnails {
      min-height: 62px;
    }
  </style>
</head>

<body class="bg-light">
  <div class="container mt-4" style="max-width:700px">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold mb-0">Đăng ký sinh viên mới</h2>
      <a href="/" class="btn btn-outline-secondary btn-sm">← Quay lại</a>
    </div>

    <!-- Step 1 ─ Student details -->
    <div class="card shadow-sm mb-4">
      <div class="card-body p-4">
        <h6 class="text-muted mb-3">Thông tin sinh viên</h6>
        <div class="mb-3">
          <label class="form-label">Họ và tên *</label>
          <input type="text" id="full_name" class="form-control" placeholder="Nguyễn Văn A">
        </div>
        <div class="row g-3">
          <div class="col">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="nguyenvana@gmail.com">
          </div>
          <div class="col">
            <label class="form-label">Lớp</label>
            <input type="text" id="department" class="form-control" placeholder="33CNTT11">
          </div>
        </div>
      </div>
    </div>

    <!-- Step 2 ─ Webcam capture -->
    <div class="card shadow-sm mb-4">
      <div class="card-body p-4">
        <h6 class="text-muted mb-3">Bắt đầu quay video</h6>

        <div class="mb-2">
          <video id="video" class="ring-wait" autoplay playsinline></video>
          <canvas id="canvas" class="d-none" width="640" height="480"></canvas>
        </div>

        <!-- Progress -->
        <div class="mb-2">
          <div class="d-flex justify-content-between small mb-1">
            <span id="status-text" class="text-muted">Ấn "Bắt đầu" để bắt đầu quay video.</span>
            <span id="count-text" class="text-muted fw-semibold">0 / 30</span>
          </div>
          <div class="progress" style="height:8px">
            <div id="prog-bar" class="progress-bar bg-success transition" role="progressbar" style="width:0%"></div>
          </div>
        </div>

        <!-- Controls -->
        <div class="d-flex gap-2 mb-3">
          <button id="btn-start" class="btn btn-primary" onclick="startCapture()">▶ Bắt đầu</button>
          <button id="btn-pause" class="btn btn-outline-secondary d-none" onclick="pauseCapture()">⏸ Tạm dừng</button>
          <button id="btn-resume" class="btn btn-outline-primary   d-none" onclick="resumeCapture()">▶ Tiếp tục</button>
          <button id="btn-reset" class="btn btn-outline-danger    d-none" onclick="resetCapture()">↩ Đặt lại</button>
        </div>

        <!-- Thumbnail strip -->
        <div id="thumbnails" class="d-flex flex-wrap gap-1"></div>
      </div>
    </div>

    <button id="btn-register" class="btn btn-success w-100 btn-lg mb-5" onclick="registerUser()" disabled>
      Đăng ký
    </button>

    <div id="result-msg" class="alert d-none mb-5"></div>
  </div>

  <script>
    const TARGET = 30;
    const MIN_OK = 20;
    const INTERVAL = 300;   // ms between frame sends

    let sessionId = null;
    let captureCount = 0;
    let running = false;
    let intervalId = null;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const progBar = document.getElementById('prog-bar');
    const countTxt = document.getElementById('count-text');
    const statusTx = document.getElementById('status-text');

    // ── Camera init ──────────────────────────────────────────────────────────────
    navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
      .then(s => { video.srcObject = s; })
      .catch(() => setStatus('Hiện không thể truy cập camera.', 'text-danger'));

    // ── Controls ─────────────────────────────────────────────────────────────────
    async function startCapture() {
      const name = document.getElementById('full_name').value.trim();
      if (!name) { showMsg('Vui lòng nhập tên sinh viên.', 'warning'); return; }

      const res = await fetch('/api/users/session/start', { method: 'POST' });
      const data = await res.json();
      sessionId = data.session_id;
      captureCount = 0;

      show('btn-start', false);
      show('btn-pause', true);
      show('btn-reset', true);

      running = true;
      intervalId = setInterval(sendFrame, INTERVAL);
      setStatus('Đang quay video…', 'text-muted');
    }

    function pauseCapture() {
      running = false;
      clearInterval(intervalId);
      show('btn-pause', false);
      show('btn-resume', true);
      setStatus(`Tạm dừng tại ${captureCount} khung hình.`, 'text-muted');
    }

    function resumeCapture() {
      if (captureCount >= TARGET) return;
      running = true;
      intervalId = setInterval(sendFrame, INTERVAL);
      show('btn-pause', true);
      show('btn-resume', false);
      setStatus('Resumed — keep looking at the camera.', 'text-muted');
    }

    function resetCapture() {
      running = false;
      clearInterval(intervalId);
      sessionId = null;
      captureCount = 0;

      document.getElementById('thumbnails').innerHTML = '';
      progBar.style.width = '0%';
      countTxt.textContent = '0 / ' + TARGET;

      show('btn-start', true);
      show('btn-pause', false);
      show('btn-resume', false);
      show('btn-reset', false);
      document.getElementById('btn-register').disabled = true;
      video.className = 'ring-wait';
      setStatus('Press Start to begin capture.', 'text-muted');
    }

    // ── Frame send loop ───────────────────────────────────────────────────────────
    async function sendFrame() {
      if (!running || captureCount >= TARGET) {
        pauseCapture();
        return;
      }

      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, 640, 480);
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));

      try {
        const res = await fetch(`/api/users/session/${sessionId}/frame`, {
          method: 'POST',
          headers: { 'Content-Type': 'image/jpeg' },
          body: blob,
        });
        const data = await res.json();

        if (data.detected) {
          captureCount = data.count;
          video.className = 'ring-ok';
          addThumb(data.thumbnail);
          updateProgress();
          if (data.done) {
            pauseCapture();
            setStatus(`Done! ${captureCount} frames captured. Ready to register.`, 'text-success');
          }
        } else {
          video.className = 'ring-wait';
          setStatus('No face detected — move closer or improve lighting.', 'text-warning');
        }
      } catch (_) { /* transient network error, skip frame */ }
    }

    // ── UI helpers ────────────────────────────────────────────────────────────────
    function addThumb(b64) {
      const img = document.createElement('img');
      img.src = 'data:image/jpeg;base64,' + b64;
      img.className = 'thumb';
      img.title = `Frame ${captureCount}`;
      document.getElementById('thumbnails').appendChild(img);
    }

    function updateProgress() {
      const pct = Math.min(100, Math.round((captureCount / TARGET) * 100));
      progBar.style.width = pct + '%';
      countTxt.textContent = captureCount + ' / ' + TARGET;
      if (captureCount >= MIN_OK) {
        document.getElementById('btn-register').disabled = false;
        setStatus(`${captureCount} frames captured — you can register now or keep going.`, 'text-success');
      } else {
        setStatus(`${captureCount} / ${MIN_OK} minimum frames captured…`, 'text-muted');
      }
    }

    function show(id, visible) {
      document.getElementById(id).classList.toggle('d-none', !visible);
    }

    function setStatus(msg, cls) {
      statusTx.className = 'small ' + cls;
      statusTx.textContent = msg;
    }

    // ── Register & train ──────────────────────────────────────────────────────────
    async function registerUser() {
      const name = document.getElementById('full_name').value.trim();
      if (!name) { showMsg('Please enter a full name.', 'warning'); return; }
      if (!sessionId) { showMsg('Please capture face samples first.', 'warning'); return; }
      if (captureCount < MIN_OK) {
        showMsg(`Need at least ${MIN_OK} captured frames (have ${captureCount}).`, 'warning');
        return;
      }

      const btn = document.getElementById('btn-register');
      btn.disabled = true;
      btn.textContent = 'Đang xử lý...';

      try {
        const res = await fetch('/api/users/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: sessionId,
            full_name: name,
            email: document.getElementById('email').value.trim(),
            department: document.getElementById('department').value.trim(),
          }),
        });
        const data = await res.json();

        if (res.ok) {
          showMsg(
            `✅ ${name} đã được đăng ký (ID ${data.id}) với ${data.captures_saved} ảnh. `,
            'success'
          );
          setTimeout(() => window.location.href = '/', 3000);
        } else {
          showMsg('❌ ' + (data.error || 'Đăng ký thất bại.'), 'danger');
          btn.disabled = false;
          btn.textContent = '✅ Đăng ký & Huấn luyện mô hình';
        }
      } catch (e) {
        showMsg('❌ Lỗi máy chủ: ' + e.message, 'danger');
        btn.disabled = false;
        btn.textContent = '✅ Đăng ký & Huấn luyện mô hình';
      }
    }

    function showMsg(text, type) {
      const el = document.getElementById('result-msg');
      el.className = 'alert alert-' + type;
      el.textContent = text;
      el.classList.remove('d-none');
      el.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>

</html>
